<!doctype html>
<html lang="en">

<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Lewis Mason — Ceramics</title>
<meta name="description" content="Shop available ceramics."/>
<link rel="stylesheet" href="styles.css"/>
</head>

<body>

<header class="header" id="topbar">

<div class="header-inner">

<a class="logo" href="#top">
<img src="images/logo2.png" alt="Lew John Ceramics">
</a>

<nav class="nav">
<a href="#top">Home</a>
<a href="#shop">Shop</a>
<a href="#contact">Contact</a>
</nav>

</div>

</header>


<!-- HERO -->

<section id="top" class="banner">

<img src="images/logo.png" alt="Lew John Ceramics">

</section>


<main>

<section id="shop" class="topline">

<h1 id="shopTitle">Available Work</h1>
<p>Wheel-thrown ceramics · photographed individually</p>

</section>


<section aria-label="Shop">

<!-- NEXT DROP MESSAGE -->

<div id="comingSoon" class="coming-soon">

<h2>Next Drop Coming Soon</h2>

<p id="dropText"></p>

<p>
Follow 
<a href="https://instagram.com/lew.j0hn" target="_blank">
@lew.j0hn
</a>
for updates.
</p>

</div>


<!-- PRODUCT GRID -->

<div id="productGrid" class="grid" aria-live="polite"></div>

</section>


<!-- CONTACT SECTION -->

<section id="contact" class="contact">

<h2>Contact</h2>

<p>
For commissions, enquiries, or purchasing work please get in touch.
</p>

<div class="contact-links">

<a href="mailto:lewis2000mason@gmail.com">Email</a>

<a href="https://instagram.com/lew.j0hn" target="_blank">
Instagram
</a>

</div>

</section>

</main>


<footer class="footer">

<div class="footer-inner">

<div>© <span id="year"></span> Lewis Mason</div>

<div>
<a href="#top">Back to top</a>
</div>

</div>

</footer>


<!-- PRODUCT MODAL -->

<dialog id="productModal" class="modal">

<form method="dialog" class="modal-inner">

<button class="modal-close">×</button>

<div class="modal-media">
<img id="modalImg">
</div>

<div class="modal-content">

<h3 id="modalTitle"></h3>

<p id="modalPrice" class="muted"></p>

<p id="modalDesc" class="muted"></p>

<ul id="modalMeta" class="meta"></ul>

<div class="modal-actions">
<a id="modalBuy" class="button" href="#">Buy</a>
<button class="button button-ghost">Close</button>
</div>

</div>

</form>

</dialog>


<script src="shop.js"></script>
<script src="shop-control.js"></script>

<script>

document.getElementById("year").textContent = new Date().getFullYear();

window.addEventListener("load", () => {
document.body.classList.add("loaded");
});

</script>

</body>
</html>
