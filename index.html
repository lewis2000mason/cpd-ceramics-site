<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Lewis Mason — Ceramics</title>
  <meta name="description" content="Shop available ceramics." />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header class="header" id="topbar">
  <div class="header-inner">
    <a class="brand" href="index.html" aria-label="Home">Lew John</a>
    <nav class="nav">
      <a href="index.html" aria-current="page">Home</a>
      <a href="contact.html">Contact</a>
    </nav>
  </div>
</header>

  <main>
    <section class="banner" id="banner">
  <img src="images/logo.png" alt="Lew John — Professional Ceramist">
</section>
    <section class="banner">
  <img src="images/logo.png" alt="Lew John Ceramics Logo">
</section>
    
    <section class="topline">
      <h1>Available work</h1>
      <p>Wheel-thrown ceramics · photographed individually</p>
    </section>

    <section aria-label="Shop">
      <div id="productGrid" class="grid" aria-live="polite"></div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <div>© <span id="year"></span> Lewis Mason</div>
      <div>
        <a href="contact.html">Contact</a>
        &nbsp;·&nbsp;
        <a href="https://instagram.com/yourhandle" target="_blank" rel="noopener">Instagram</a>
      </div>
    </div>
  </footer>

  <dialog id="productModal" class="modal">
    <form method="dialog" class="modal-inner">
      <button class="modal-close" aria-label="Close">×</button>

      <div class="modal-media">
        <img id="modalImg" alt="" />
      </div>

      <div class="modal-content">
        <h3 id="modalTitle"></h3>
        <p id="modalPrice" class="muted" style="margin:0 0 10px;"></p>
        <p id="modalDesc" class="muted" style="margin:0;"></p>

        <ul id="modalMeta" class="meta"></ul>

        <div class="modal-actions">
          <a id="modalBuy" class="button" href="#" target="_blank" rel="noopener">Buy</a>
          <button class="button button-ghost" value="cancel">Close</button>
        </div>

        <p class="muted" style="font-size:12px; margin-top:12px;">
          For questions, use the contact page.
        </p>
      </div>
    </form>
  </dialog>

  <script src="shop.js"></script>
  <script>document.getElementById("year").textContent = new Date().getFullYear();</script>
</body>
</html>
